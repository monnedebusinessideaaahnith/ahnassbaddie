<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Georgia', serif;
        background: linear-gradient(to bottom, #fff8f0, #fbe4d8);
        text-align: center;
        color: #5a3e36;
    }

    .container {
        max-width: 800px;
        margin: 50px auto;
        padding: 30px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    h1 {
        font-size: 3rem;
        color: #b76e79;
        margin-bottom: 10px;
    }

    .couple {
        font-size: 2rem;
        margin: 20px 0;
        font-weight: bold;
    }

    .date {
        font-size: 1.4rem;
        margin: 15px 0;
    }

    .venue {
        font-size: 1.2rem;
        line-height: 1.8;
    }

    .divider {
        width: 100px;
        height: 3px;
        background: #b76e79;
        margin: 25px auto;
    }

    .footer {
        margin-top: 30px;
        font-style: italic;
    }

    @media (max-width: 600px) {
        h1 {
            font-size: 2rem;
        }

        .couple {
            font-size: 1.5rem;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h1>Wedding Invitation</h1>

    <div class="divider"></div>

    <p>Together with their families</p>

    <div class="couple">
        Abhishek <br> & <br> Anjali
    </div>

    <p>Request the honor of your presence at their wedding celebration</p>

    <div class="date">
        Sunday, 15 December 2026<br>
        10:30 AM
    </div>

    <div class="divider"></div>

    <div class="venue">
        Grand Wedding Hall<br>
        Kochi, Kerala
    </div>

    <div class="footer">
        We look forward to celebrating with you.
    </div>
</div>

</body>
</html>
